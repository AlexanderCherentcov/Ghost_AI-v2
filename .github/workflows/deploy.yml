name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'bot/**'
      - 'frontend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.217.101.193
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/ghostline_v2
            git pull origin master
            cd infra

            # 1. Инфраструктура (postgres + redis) — без пересборки
            docker compose up -d --remove-orphans postgres redis

            # 2. Backend + Bot — пересобираем при изменениях
            docker compose up -d --build --remove-orphans backend bot

            # 3. Frontend — пересобираем при изменениях
            docker compose up -d --build --remove-orphans frontend

            # 4. Nginx + Certbot — без пересборки (используют образы)
            docker compose up -d --remove-orphans nginx certbot

            # 5. Очищаем старые образы
            docker image prune -f

            echo "✅ Deploy done: $(date)"
