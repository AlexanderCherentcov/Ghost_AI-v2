name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          BACKEND=$(echo "$CHANGED" | grep -q '^backend/' && echo true || echo false)
          FRONTEND=$(echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false)
          echo "backend=$BACKEND" >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "Changed services — backend: $BACKEND, frontend: $FRONTEND"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.253.55.232
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_BACKEND,DEPLOY_FRONTEND
          command_timeout: 15m
          script: |
            set -e
            cd /root/ghostline_v2

            # Reset any local changes and pull latest
            git reset --hard HEAD
            git pull origin master

            cd infra

            if [ "$DEPLOY_BACKEND" = "true" ]; then
              echo "→ Rebuilding backend..."
              docker compose build --no-cache backend
              docker compose up -d --no-deps backend
              echo "→ Backend deployed"
            fi

            if [ "$DEPLOY_FRONTEND" = "true" ]; then
              echo "→ Rebuilding frontend..."
              docker compose build --no-cache frontend
              docker compose up -d --no-deps frontend
              echo "→ Frontend deployed"
            fi

            docker image prune -f
            echo "✅ Deploy done: $(date)"
        env:
          DEPLOY_BACKEND: ${{ steps.changes.outputs.backend }}
          DEPLOY_FRONTEND: ${{ steps.changes.outputs.frontend }}
