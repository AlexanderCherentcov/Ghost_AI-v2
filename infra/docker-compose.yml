version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ghost
      POSTGRES_DB: ghostline_v2
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ghost -d ghostline_v2']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-R3d1sGh0stPr0d2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    restart: always
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-R3d1sGh0stPr0d2024}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghostline-backend:latest
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:4000:4000'
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    image: ghostline-bot:latest
    restart: always
    env_file: .env
    environment:
      - INTERNAL_API_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ghost_net

networks:
  ghost_net:
    external: true
    name: infra_ghost_net

volumes:
  postgres_data:
    external: true
    name: infra_postgres_data
  redis_data:
    external: true
    name: infra_redis_data
