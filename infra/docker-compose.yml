version: '3.9'

# Подключаемся к уже запущенным postgres + redis через существующую сеть infra_ghost_net
# Запускаем только сам бэкенд

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghostline-backend:latest
    restart: always
    env_file: .env
    ports:
      - '127.0.0.1:4000:4000'
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ghost_net:
    external: true
    name: infra_ghost_net
