version: '3.9'

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-R3d1sGh0stPr0d2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    restart: always
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-R3d1sGh0stPr0d2024}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghostline-backend:latest
    restart: always
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      # Routes "postgres" hostname to the Docker host gateway
      # so Prisma can reach the PostgreSQL service running on the host OS
      - "postgres:host-gateway"
    ports:
      - '127.0.0.1:4000:4000'
    networks:
      - ghost_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    image: ghostline-bot:latest
    restart: always
    env_file: .env
    environment:
      - INTERNAL_API_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ghost_net

networks:
  ghost_net:
    external: true
    name: infra_ghost_net
