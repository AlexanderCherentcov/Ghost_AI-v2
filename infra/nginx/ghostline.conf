# ══════════════════════════════════════════════════════════════════════════════
#  Nginx — GhostLine Production Config
#  Путь: /etc/nginx/sites-available/ghostline
#  Симлинк: ln -s /etc/nginx/sites-available/ghostline /etc/nginx/sites-enabled/
#
#  Замени ghostlineai.ru на свой домен.
#  SSL-сертификаты выпускает certbot автоматически.
# ══════════════════════════════════════════════════════════════════════════════

# ─── Rate limiting zones ──────────────────────────────────────────────────────
# Один буфер для IP-based лимитов (до уровня Nginx, до Fastify rate-limit)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ws_limit:10m  rate=5r/m;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ghostlineai.ru www.ghostlineai.ru miniapp.ghostlineai.ru;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect всё остальное на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend (Next.js) ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ghostlineai.ru www.ghostlineai.ru miniapp.ghostlineai.ru;

    # SSL (certbot заполнит эти пути автоматически)
    ssl_certificate     /etc/letsencrypt/live/ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # CSP — настрой под свои нужды
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https:;"
        always;

    # ── Real IP из Cloudflare ─────────────────────────────────────
    # Cloudflare IP ranges — обновляй по https://www.cloudflare.com/ips/
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Проксирование на Next.js (порт 3000) ─────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout для Next.js
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ─── Backend API + WebSocket ──────────────────────────────────────────────────
# Если backend на отдельном субдомене (api.ghostlineai.ru)
# или можно убрать и маршрутизировать /api через frontend-блок
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ghostlineai.ru;

    ssl_certificate     /etc/letsencrypt/live/ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Cloudflare real IP (те же ranges что выше)
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 162.158.0.0/15;
    real_ip_header CF-Connecting-IP;

    # ── Generated videos (Range-capable, no rate limit) ──────────
    location /videos/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Range $http_range;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
        add_header         Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # ── API endpoints с rate limiting ─────────────────────────────
    location /api/ {
        # Nginx-уровень rate limit (до Fastify) — 30 req/min per IP
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Большой таймаут для генерации
        proxy_read_timeout 120s;

        # Отключаем буферизацию для SSE/streaming
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── WebSocket ─────────────────────────────────────────────────
    location /api/chat/stream {
        # Отдельный zone для WS — 5 подключений/мин с IP
        limit_req zone=ws_limit burst=5 nodelay;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket таймаут — 1 час (для долгих генераций)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check (без rate limit) ─────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:4000;
    }
}
