# ══════════════════════════════════════════════════════════════════════════════
#  Nginx — GhostLine Docker Config
#  Отличие от ghostline.conf: proxy_pass использует Docker-имена сервисов,
#  а не 127.0.0.1. SSL-сертификаты монтируются через volume certbot.
# ══════════════════════════════════════════════════════════════════════════════

# NOTE: nginx-level rate limiting removed — Docker NAT masks all client IPs as
# the bridge gateway (172.18.0.1), so all users would share ONE bucket and
# innocent users get 429. Rate limiting is handled by @fastify/rate-limit on
# the backend, which uses X-Real-IP for per-client keying.

# ─── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ghostlineai.ru www.ghostlineai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ghostlineai.ru$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.ghostlineai.ru;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Backend API + WebSocket ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ghostlineai.ru;

    ssl_certificate     /etc/letsencrypt/live/ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 162.158.0.0/15;
    real_ip_header CF-Connecting-IP;

    location /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /api/chat/stream {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend:4000;
    }
}

# ─── Frontend (основной сайт) ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ghostlineai.ru www.ghostlineai.ru;

    ssl_certificate     /etc/letsencrypt/live/ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # www → non-www
    if ($host = www.ghostlineai.ru) {
        return 301 https://ghostlineai.ru$request_uri;
    }

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
