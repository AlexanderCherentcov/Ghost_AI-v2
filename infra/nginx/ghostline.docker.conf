# ══════════════════════════════════════════════════════════════════════════════
#  Nginx — GhostLine Docker Config
#  Отличие от ghostline.conf: proxy_pass использует Docker-имена сервисов,
#  а не 127.0.0.1. SSL-сертификаты монтируются через volume certbot.
# ══════════════════════════════════════════════════════════════════════════════

# NOTE: nginx-level rate limiting removed — Docker NAT masks all client IPs as
# the bridge gateway (172.18.0.1), so all users would share ONE bucket and
# innocent users get 429. Rate limiting is handled by @fastify/rate-limit on
# the backend, which uses X-Real-IP for per-client keying.

# ─── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ghostlineai.ru www.ghostlineai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ghostlineai.ru$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.ghostlineai.ru;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Backend API + WebSocket ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ghostlineai.ru;

    ssl_certificate     /etc/letsencrypt/live/api.ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Docker's internal DNS — re-resolves service IPs after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend_upstream http://backend:4000;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Generated images — served by backend from uploads/images/
    location /images/ {
        set $backend_upstream http://backend:4000;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
        add_header         Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Generated videos — served by backend from uploads/videos/ with Range support
    location /videos/ {
        set $backend_upstream http://backend:4000;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Range $http_range;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
        add_header         Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Generated audio — served by backend from uploads/audio/
    location /audio/ {
        set $backend_upstream http://backend:4000;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 120s;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
        add_header         Cross-Origin-Resource-Policy "cross-origin" always;
    }

    location /api/chat/stream {
        set $backend_upstream http://backend:4000;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        set $backend_upstream http://backend:4000;
        proxy_pass $backend_upstream;
    }
}

# ─── Telegram Mini App ───────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.ghostlineai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ghostlineai.ru;

    ssl_certificate     /etc/letsencrypt/live/app.ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $miniapp_upstream http://miniapp:3001;
        proxy_pass         $miniapp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /_next/static/ {
        set $miniapp_upstream http://miniapp:3001;
        proxy_pass         $miniapp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
    }
}

# ─── Frontend (основной сайт) ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ghostlineai.ru www.ghostlineai.ru;

    ssl_certificate     /etc/letsencrypt/live/ghostlineai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghostlineai.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Docker's internal DNS — re-resolves service IPs after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # www → non-www
    if ($host = www.ghostlineai.ru) {
        return 301 https://ghostlineai.ru$request_uri;
    }

    # JS/CSS chunks have content-hash in filename — cache aggressively
    location /_next/static/ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # HTML pages — never cache (always fresh)
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
